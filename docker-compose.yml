services:
  game:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - HOST_IP=${HOST_IP:-}
    command: npm run dev

  test:
    build:
      context: .
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
    command: npm run coverage
    profiles:
      - test

  check:
    build:
      context: .
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
    command: sh -c "npm run lint && npm test && npm run build"
    profiles:
      - check
